name: Build and Release Agent

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Agent
        run: cargo build -p client-desktop --release

      - name: Package
        run: |
          mkdir dist
          cp target/release/client-desktop.exe dist/watchme-agent.exe
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-agent
          path: dist/watchme-agent.exe

  release:
    needs: build-windows
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-agent

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: watchme-agent.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
