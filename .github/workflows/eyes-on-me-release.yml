name: eyes-on-me-release

on:
  # 手动触发：用于临时验证打包流程，或手动跑一次发版前检查。
  workflow_dispatch:
  push:
    # 只有推送 v1.2.3 这类版本标签时，才会真正执行发版构建。
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: eyes-on-me-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    # 发版使用的完整跨平台打包矩阵，会为多个目标平台生成产物。
    name: build-${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - runner: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            archive: tar.gz
            linker: aarch64-linux-gnu-gcc
            packages: gcc-aarch64-linux-gnu
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
          - runner: windows-latest
            target: aarch64-pc-windows-msvc
            archive: zip
          - runner: macos-14
            target: aarch64-apple-darwin
            archive: tar.gz
          - runner: macos-14
            target: x86_64-apple-darwin
            archive: tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.6.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install Linux cross linker
        if: runner.os == 'Linux' && matrix.packages
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.packages }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Package target bundle
        # 这里统一强制使用 bash，因为打包入口本身是 shell 脚本，Windows 也一样。
        env:
          TARGET_TRIPLE: ${{ matrix.target }}
          BUNDLE_NAME: eyes-on-me-bundle-${{ matrix.target }}
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.linker || '' }}
        shell: bash
        run: ./_scripts/package-target.sh

      - name: Archive bundle (unix)
        if: matrix.archive == 'tar.gz'
        run: |
          tar -C _dist -czf "_dist/eyes-on-me-bundle-${{ matrix.target }}.tar.gz" "eyes-on-me-bundle-${{ matrix.target }}"

      - name: Archive bundle (windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          Compress-Archive -Path "_dist/eyes-on-me-bundle-${{ matrix.target }}" -DestinationPath "_dist/eyes-on-me-bundle-${{ matrix.target }}.zip" -Force

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: eyes-on-me-bundle-${{ matrix.target }}
          path: _dist/eyes-on-me-bundle-${{ matrix.target }}.${{ matrix.archive }}
          if-no-files-found: error
          retention-days: 14

  release:
    # 只有版本标签构建才会发布 GitHub Release。
    name: publish-release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: eyes-on-me-bundle-*
          merge-multiple: true
          path: release-assets

      - name: Generate checksums
        run: |
          cd release-assets
          sha256sum eyes-on-me-bundle-* > SHA256SUMS.txt

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Eyes on Me ${{ github.ref_name }}
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            release-assets/eyes-on-me-bundle-*
            release-assets/SHA256SUMS.txt
